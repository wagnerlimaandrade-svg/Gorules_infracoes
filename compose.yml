services:
  decision-service:
    build:
      context: ./decision-service
    container_name: infracoes-decision-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      RULE_FILE: /app/rules/classificacao-infracao.json
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - infracoes-network

  node-red:
    image: nodered/node-red:latest
    container_name: infracoes-node-red
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      DECISION_SERVICE_URL: http://decision-service:3000
    ports:
      - "1880:1880"
    volumes:
      - node-red-data:/data
    depends_on:
      decision-service:
        condition: service_healthy
    networks:
      - infracoes-network

volumes:
  node-red-data:

networks:
  infracoes-network:
    driver: bridge